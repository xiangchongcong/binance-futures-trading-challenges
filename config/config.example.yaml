app:
  name: "binance-futures-trading-challenges"
  host: "0.0.0.0"
  port: 8000
  log_level: "INFO"

exchange:
  symbol: "BTCUSDT"
  default_leverage: 5
  recv_window: 5000
  request_timeout_seconds: 10

execution:
  max_single_order_notional_usdt: 100
  max_open_exposure_usdt: 500
  allow_market_order: true
  allow_limit_order: true
  dry_run: true

risk:
  max_daily_loss_pct: 3.0
  max_consecutive_losses: 3
  max_api_failures: 5

monitoring:
  kline_interval: "1m"
  volatility_threshold_pct: 1.5
  reconnect_delay_seconds: 5

service:
  enable_api: true
  enable_market_monitor: true
  enable_user_stream: true
